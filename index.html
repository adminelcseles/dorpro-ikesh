<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Door Pro Order Sheet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#eef2f7;min-height:100vh;padding:14px 8px;display:flex;flex-direction:column;gap:12px;align-items:center}
@media(max-width:600px){body{padding:8px 4px;gap:8px}}

.top-bar{display:flex;align-items:center;gap:8px;width:100%;max-width:720px;flex-wrap:wrap}
@media(max-width:600px){.top-bar{gap:6px}.tbtn{font-size:13px;padding:8px 12px;min-height:42px}}
.app-title{font-size:17px;font-weight:700;color:#222}
.top-btns{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
.tbtn{padding:7px 13px;font-size:12px;font-weight:700;border-radius:8px;border:2px solid #ccc;background:white;color:#333;cursor:pointer;transition:all .15s}
.tbtn:hover{background:#f0f0f0}
.tbtn.addwg{background:#555;color:white;border-color:#555}
.tbtn.add1{background:#1a1aff;color:white;border-color:#1a1aff}
.tbtn.add2{background:#cc0000;color:white;border-color:#cc0000}
.tbtn.print{background:#1a7a1a;color:white;border-color:#1a7a1a}
.tbtn.whatsapp{background:#25D366;color:white;border-color:#1db954}
.tbtn.whatsapp:hover{background:#1db954}
.tbtn.side-on{background:#f5d800;color:#222;border-color:#e6c800}

/* CUSTOMER */
.cust-card{background:white;border-radius:12px;border:2px solid #f5d80099;padding:14px 12px;width:100%;max-width:720px;box-sizing:border-box}
.cust-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.cfield{display:flex;flex-direction:column;gap:4px}
.cfield label{font-size:12px;font-weight:700;color:#666;white-space:nowrap}
.cfield input,.cfield select,.cfield textarea{padding:10px 12px;font-size:15px;border-radius:8px;border:2px solid #ccc;background:white;color:#222;outline:none;width:100%;box-sizing:border-box;min-height:44px}
.cfield input:focus,.cfield select:focus,.cfield textarea:focus{border-color:#f5d800}
@media(max-width:600px){
  .cust-grid{grid-template-columns:1fr 1fr;gap:8px}
  .cfield input,.cfield select,.cfield textarea{font-size:16px;padding:11px 12px;min-height:48px}
  .cfield label{font-size:13px}
}
@media(max-width:400px){
  .cust-grid{grid-template-columns:1fr;gap:8px}
}

/* SUMMARY */
.summary-card{background:white;border-radius:12px;border:2px solid #1a1aff33;padding:14px;width:100%;max-width:720px}
.summary-card h3{font-size:13px;font-weight:700;color:#555;margin-bottom:10px;border-bottom:1px solid #eee;padding-bottom:6px}
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:400px){.sum-grid{grid-template-columns:repeat(2,1fr)}}
.sum-box{background:#f5f5f5;border-radius:8px;padding:8px;text-align:center}
.sum-box .sv{font-size:22px;font-weight:700}
.sum-box .sl{font-size:11px;color:#888;margin-top:2px}

/* VIEW */
.view-area{width:100%;max-width:720px;display:flex;flex-direction:column;gap:12px}
.view-area.side{flex-direction:row;flex-wrap:wrap;align-items:flex-start}
.empty-msg{color:#bbb;font-size:14px;text-align:center;padding:32px 0}

/* DOOR BLOCK */
.door-block{background:white;border-radius:12px;border:2px solid #ddd;padding:14px;cursor:grab;transition:box-shadow .15s;min-width:280px;flex:1}
.door-block.twg{border-color:#f5d80099}
.door-block.t1{border-color:#1a1aff55}
.door-block.t2{border-color:#cc000055}
.door-block.dragging{opacity:.35;box-shadow:0 0 0 3px #f5d800}
.door-block.drag-over{box-shadow:0 0 0 3px #1a1aff;background:#f0f4ff}

.door-header{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.drag-handle{font-size:18px;color:#bbb;cursor:grab;user-select:none;padding:0 3px}
.door-label{font-size:12px;font-weight:700;padding:3px 10px;border-radius:5px;color:white}
.lblwg{background:#666}.lbl1{background:#1a1aff}.lbl2{background:#cc0000}
.del-btn{margin-left:auto;background:none;border:none;cursor:pointer;font-size:16px;color:#cc0000;padding:2px 6px;border-radius:5px}
.del-btn:hover{background:#ffeaea}

/* DOOR INNER: inputs top-left compact, SVG right big */
.door-inner{display:grid;grid-template-columns:200px 1fr;gap:12px;align-items:start}
@media(max-width:600px){.door-inner{grid-template-columns:1fr;gap:8px}.svg-preview{order:-1}}

/* 4 inputs in ONE ROW: 2 columns, 2 rows */
.inputs-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.finput{display:flex;flex-direction:column;gap:2px}
.finput label{font-size:11px;font-weight:700;color:#666}
.finput input{padding:5px 7px;font-size:13px;border-radius:6px;border:2px solid #ccc;background:white;color:#222;outline:none;width:100%}
.finput input:focus{border-color:#f5d800}

.extra-controls{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.ctrl-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.ctrl-lbl{font-size:11px;font-weight:700;color:#666;min-width:70px}

.motor-btn{width:40px;padding:4px 0;font-size:14px;font-weight:700;border-radius:6px;border:2px solid #ccc;background:#f5f5f5;cursor:pointer;color:#555;text-align:center;transition:all .15s}
.motor-btn.active{background:#f5d800;color:#222;border-color:#e6c800}
.tog-btn{padding:4px 12px;font-size:12px;font-weight:700;border-radius:6px;border:2px solid #ccc;cursor:pointer;opacity:.35;color:white;transition:all .15s}
.tog-btn.active{opacity:1}
.tog-btn.red-btn{background:#dd1111;border-color:#aa0000}
.tog-btn.blue-btn{background:#2244cc;border-color:#112299}
.box-btn{padding:4px 7px;font-size:10px;font-weight:700;border-radius:5px;border:2px solid #ccc;cursor:pointer;opacity:.35;transition:all .15s}
.box-btn.active{opacity:1}
.box-btn.red{background:#ff4444;color:white;border-color:#cc0000}
.box-btn.yellow{background:#f5d800;color:#222;border-color:#c8b000}
.box-btn.orange{background:#ff8c00;color:white;border-color:#e07000}
.box-btn.sky{background:#00bfff;color:white;border-color:#009acc}
.combo-btn{padding:4px 8px;font-size:12px;font-weight:700;border-radius:6px;border:2px solid #ccc;background:#f5f5f5;cursor:pointer;color:#555;transition:all .15s}
.combo-btn.active{background:#ff8c00;color:white;border-color:#ff8c00}

.totals{margin-top:8px;padding:7px;background:#f5f5f5;border-radius:8px;display:flex;flex-direction:column;gap:4px}
.total-row{display:flex;align-items:center;gap:3px}
.tlabel{font-size:11px;font-weight:700;min-width:68px}
.tlabel.blue{color:#1a1aff}.tlabel.red{color:#cc0000}.tlabel.dk{color:#333}
.tval{background:white;border:1px solid #ddd;border-radius:5px;padding:2px 6px;font-size:11px;font-weight:700;min-width:44px;text-align:center}
.tplus,.teq{font-size:10px;font-weight:700;color:#888}

/* SVG BIG */
.svg-preview{width:100%}
.svg-preview svg{width:100%;height:auto;display:block}

/* ═══════════════════════════════════════════
   PRINT — A4 Portrait (margin 5mm each side)
   Usable: 200mm wide × 287mm tall

   PAGE 1 : header ~20mm + 4 doors in 2×2 grid
            each door: (287-20-2mm gap)/2 rows = 132mm tall, ~99mm wide

   PAGE 2+: 8 doors in 4×2 grid
            each door: (287-3×2mm)/4 = 69mm tall, ~99mm wide
═══════════════════════════════════════════ */
@media print{
  @page{size:A4 portrait;margin:5mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  svg rect,svg line,svg circle,svg path,svg text{color-adjust:exact!important;-webkit-print-color-adjust:exact!important}
  body{background:white!important;padding:0!important;margin:0!important;display:block!important;width:200mm!important}

  .top-bar,.summary-card,.empty-msg{display:none!important}
  .del-btn,.drag-handle,.extra-controls{display:none!important}

  /* ── Customer header ── */
  .cust-card{
    display:block!important;border:none!important;border-radius:0!important;
    box-shadow:none!important;padding:0!important;margin:0 0 2mm 0!important;
    width:200mm!important;max-width:200mm!important;
  }
  .cust-grid{display:none!important}
  .print-cust-table{
    display:table!important;width:200mm!important;border-collapse:collapse!important;
    margin-bottom:2mm!important;
  }
  .print-cust-table th{background:#222!important;color:white!important;padding:3px 6px!important;font-size:10px!important;font-weight:700!important}
  .print-cust-table td{padding:3px 6px!important;border:1px solid #bbb!important;font-size:10px!important;font-weight:600!important}
  .print-cust-table .hdr td{background:#f5d800!important;font-weight:700!important;font-size:12px!important;color:#222!important;text-align:center!important;padding:4px!important}

  /* ── View area: 2-col float layout (avoids grid+display:block conflict) ── */
  .view-area,.view-area.side{
    display:block!important;
    width:200mm!important;max-width:200mm!important;
  }

  /* ── Page break spacer ── */
  .print-page-break{
    display:block!important;
    width:200mm!important;
    height:0!important;
    clear:both!important;
    page-break-before:always!important;
    break-before:page!important;
    margin:0!important;padding:0!important;border:none!important;
  }

  /* ── Door block: float left, 2 per row ── */
  .door-block{
    float:left!important;
    width:99mm!important;
    box-sizing:border-box!important;
    break-inside:avoid!important;
    page-break-inside:avoid!important;
    border:1.5px solid #999!important;
    box-shadow:none!important;
    border-radius:3px!important;
    padding:1.5mm 2mm!important;
    margin:0 1mm 2mm 0!important;
    background:white!important;
    overflow:hidden!important;
    height:65mm!important;
    display:flex!important;
    flex-direction:column!important;
  }
  /* Right column: no right margin */
  .door-block:nth-child(even){margin-right:0!important}

  /* Page 1 doors — height set inline via JS, SVG must stay inside */
  .door-block.page1-door{
    overflow:hidden!important;
    page-break-inside:avoid!important;
    break-inside:avoid!important;
  }
  .door-block.page1-door .door-inner{
    flex:1!important;
    min-height:0!important;
    overflow:hidden!important;
  }
  .door-block.page1-door .svg-preview{
    overflow:hidden!important;
  }
  .door-block.page1-door .svg-preview svg{
    height:100%!important;
    width:100%!important;
  }

  .door-block.twg{border-color:#c8a000!important}
  .door-block.t1{border-color:#1a1aff!important}
  .door-block.t2{border-color:#cc0000!important}
  .door-block.dragging,.door-block.drag-over{opacity:1!important;box-shadow:none!important;background:white!important}

  /* ── Door header ── */
  .door-header{display:flex!important;align-items:center!important;gap:4px!important;margin-bottom:1mm!important;flex-shrink:0!important}
  .door-label{font-size:8px!important;padding:1px 5px!important}

  /* ── Door inner: inputs left 45% | SVG right 55% ── */
  .door-inner{
    display:grid!important;
    grid-template-columns:45% 55%!important;
    gap:1.5mm!important;
    align-items:stretch!important;
    flex:1!important;
    overflow:hidden!important;
    min-height:0!important;
  }
  .door-inputs{
    display:flex!important;flex-direction:column!important;
    justify-content:space-between!important;
    overflow:hidden!important;min-width:0!important;
    padding-right:1mm!important;
    border-right:1px solid #ddd!important;
  }

  /* ── Inputs 2×2 ── */
  .inputs-grid{display:grid!important;grid-template-columns:1fr 1fr!important;gap:2px!important}
  .finput{display:flex!important;flex-direction:column!important;gap:1px!important}
  .finput label{font-size:6.5px!important;font-weight:700!important;color:#444!important;line-height:1.2!important}
  .finput input{padding:1px 2px!important;font-size:7.5px!important;border:1px solid #bbb!important;border-radius:2px!important;width:100%!important;background:white!important;color:#222!important}

  /* ── Totals ── */
  .totals{padding:2px!important;margin-top:1mm!important;background:#f9f9f9!important;border-radius:2px!important;display:flex!important;flex-direction:column!important;gap:2px!important;flex-shrink:0!important}
  .total-row{display:flex!important;align-items:center!important;gap:2px!important;flex-wrap:nowrap!important}
  .tlabel{font-size:6.5px!important;font-weight:700!important;min-width:40px!important;white-space:nowrap!important}
  .tval{padding:1px 2px!important;font-size:6.5px!important;font-weight:700!important;min-width:20px!important;text-align:center!important;background:white!important;border:1px solid #ddd!important;border-radius:2px!important}
  .tplus,.teq{font-size:6px!important;font-weight:700!important;color:#888!important}

  /* ── SVG fills right side ── */
  .svg-preview{width:100%!important;height:100%!important;min-height:0!important;display:flex!important;align-items:center!important;justify-content:center!important;overflow:hidden!important;padding-left:0.5mm!important}
  .svg-preview svg{display:block!important;width:100%!important;height:100%!important;max-width:100%!important;max-height:100%!important;overflow:hidden!important}

  /* ── pg1-card SVG: full visible ── */
  .pg1-card{overflow:hidden!important;page-break-inside:avoid!important}
  .pg1-card>div:last-child{overflow:hidden!important;flex:1 1 auto!important}
  .pg1-card svg,.pg2-card svg{max-width:100%!important;overflow:hidden!important;display:block!important}
  .card{overflow:hidden!important}
  .pg1-card svg{display:block!important;overflow:hidden!important;max-width:100%!important}
  .pg1-card .card-svg{overflow:hidden!important}
  .pg1-card .card-details .ig{display:grid!important;grid-template-columns:1fr 1fr!important;gap:2px!important}
  .pg1-card .card-details .fi{display:flex!important;flex-direction:column!important;gap:1px!important}
  .pg1-card .card-details .fi label{font-size:7px!important;font-weight:700!important;color:#444!important}
  .pg1-card .card-details .fi input{font-size:9px!important;padding:1px 3px!important;border:1px solid #bbb!important;border-radius:2px!important;width:100%!important}
  .pg1-card .card-details .tots{margin-top:2px!important;padding:3px!important;background:#f9f9f9!important;border-radius:2px!important}
  .pg1-card .card-details .tot-row{display:flex!important;align-items:center!important;gap:2px!important;flex-wrap:nowrap!important}
  .pg1-card .card-details .tl{font-size:8px!important;font-weight:700!important;min-width:48px!important;white-space:nowrap!important}
  .pg1-card .card-details .tv{font-size:8px!important;font-weight:700!important;padding:1px 3px!important;background:white!important;border:1px solid #ddd!important;border-radius:2px!important;min-width:24px!important;text-align:center!important}
  .pg1-card .card-details .tp,.pg1-card .card-details .te{font-size:7px!important;color:#888!important;font-weight:700!important}
  .pg1-card .card-details .bold-val{font-size:9px!important;font-weight:900!important;min-width:22px!important}
  .pg1-card .card-details .red-val{color:#cc0000!important}
  .pg1-card .card-details .blue-val{color:#1a1aff!important}
}
</style>
</head>
<body>

<div class="top-bar">
  <span class="app-title">🚪 Door Pro Order Sheet</span>
  <div class="top-btns">
    <button class="tbtn addwg" onclick="addDoor('wg')">+ Wicket Gate</button>
    <button class="tbtn add1" onclick="addDoor('t1')">+ D 01)</button>
    <button class="tbtn add2" onclick="addDoor('t2')">+ D 02)</button>
    <button class="tbtn" id="viewBtn" onclick="toggleView()">⇔ Side-by-Side</button>
    <button class="tbtn" style="background:#e74c3c;color:white;border-color:#c0392b" onclick="if(confirm('සියලු data clear කර නව order එකක් start කරන්නද?'))resetAll()">🔄 New Order</button>
    <button class="tbtn print" onclick="doPrint()">🖨 Print / PDF</button>
    <button class="tbtn" style="background:#0f9d58;color:white;border-color:#0f9d58" onclick="window.open('https://docs.google.com/spreadsheets/d/1JJ7lEMVNBnSIQH1uwa_9Ea2bwlq3DwERkNQuuvSrOXw/edit','_blank')">📊 Open Sheet</button>
    <button class="tbtn whatsapp" onclick="sendWhatsApp()">💬 Send via WhatsApp</button>
  </div>
</div>

<!-- CUSTOMER CARD -->
<div class="cust-card">
  <div class="cust-grid">
    <div class="cfield"><label>Customer Name</label><input type="text" id="custName" placeholder="John Silva"/></div>
    <div class="cfield"><label>WhatsApp No</label><input type="text" id="custWhatsapp" placeholder="077 123 4567" oninput="formatWA(this)"/></div>
    <div class="cfield" style="grid-column:1/-1"><label>Address</label><input type="text" id="custAddress" placeholder="No. 45, Main Street, Colombo"/></div>
    <div class="cfield"><label>Order Number</label><input type="text" id="orderNum" readonly style="background:#f0f4ff;font-weight:700;color:#1a1aff;cursor:not-allowed;"/></div>
    <div class="cfield"><label>Date</label><input type="date" id="orderDate"/></div>
    <div class="cfield"><label>Payment Status</label>
      <select id="paymentStatus" style="padding:6px 8px;border:1.5px solid #ccc;border-radius:4px;font-size:14px;font-weight:600;">
        <option value="Cash">Cash</option>
        <option value="Bank Transfer">Bank Transfer</option>
        <option value="Pending">Pending</option>
      </select>
    </div>
    <div class="cfield"><label>Additional Amount (Rs)</label><input type="number" id="additionalAmount" placeholder="0" step="100" min="0" oninput="updateSummary()"/></div>
    <div class="cfield"><label>Advance (Rs)</label><input type="number" id="advanceAmount" placeholder="0" step="100" min="0"/></div>
    <div class="cfield" style="grid-column:1/-1"><label>Notes</label><textarea id="orderNotes" rows="3" placeholder="Special instructions..."></textarea></div>
  </div>
  <table class="print-cust-table" style="display:none">
    <tr class="hdr"><td colspan="4" style="font-size:14px;font-weight:700;text-align:center;padding:6px;letter-spacing:1px">🚪 DOOR PRO ORDER SHEET</td></tr>
    <tr>
      <td style="background:#f5f5f5;font-weight:700;width:18%">Customer</td>
      <td id="pt-name" style="width:32%"></td>
      <td style="background:#f5f5f5;font-weight:700;width:18%">Order No.</td>
      <td id="pt-order" style="width:32%"></td>
    </tr>
    <tr>
      <td style="background:#f5f5f5;font-weight:700">Date</td>
      <td id="pt-date"></td>
      <td style="background:#f5f5f5;font-weight:700">Total Doors</td>
      <td id="pt-total"></td>
    </tr>
    <tr>
      <td style="background:#f5f5f5;font-weight:700">Notes</td>
      <td id="pt-notes" colspan="3"></td>
    </tr>
  </table>
</div>

<!-- SUMMARY -->
<div class="summary-card">
  <h3>Order Summary</h3>
  <div class="sum-grid">
    <div class="sum-box"><div class="sv" id="sum-total" style="color:#222">0</div><div class="sl">Total Doors</div></div>
    <div class="sum-box"><div class="sv" id="sum-wg" style="color:#555">0</div><div class="sl">Wicket Gates</div></div>
    <div class="sum-box"><div class="sv" id="sum-t1" style="color:#1a1aff">0</div><div class="sl">D 01)</div></div>
    <div class="sum-box"><div class="sv" id="sum-t2" style="color:#cc0000">0</div><div class="sl">D 02)</div></div>
  </div>
  <!-- TOTAL AMOUNT ROW -->
  <div style="margin-top:10px;background:#1a2340;border-radius:10px;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <span style="color:#aab8cc;font-size:12px;font-weight:700;">D 01)</span>
      <span id="sum-d1cost" style="color:#88aaff;font-size:13px;font-weight:900;">Rs. 0/=</span>
      <span style="color:#888;font-size:13px;">+</span>
      <span style="color:#aab8cc;font-size:12px;font-weight:700;">D 02)</span>
      <span id="sum-d2cost" style="color:#ff9999;font-size:13px;font-weight:900;">Rs. 0/=</span>
      <span style="color:#888;font-size:13px;">+</span>
      <span style="color:#aab8cc;font-size:12px;font-weight:700;">WG</span>
      <span id="sum-wgcost" style="color:#f5d800;font-size:13px;font-weight:900;">Rs. 0/=</span>
      <span style="color:#888;font-size:13px;">+</span>
      <span style="color:#aab8cc;font-size:12px;font-weight:700;">Additional</span>
      <span id="sum-addcost" style="color:#cc99ff;font-size:13px;font-weight:900;">Rs. 0/=</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="color:#f5d800;font-size:13px;font-weight:700;">=&nbsp;TOTAL AMOUNT</span>
      <span id="sum-totalamt" style="color:#f5d800;font-weight:900;font-size:22px;background:rgba(245,216,0,0.12);padding:4px 14px;border-radius:6px;border:1.5px solid #f5d80066;">Rs. 0/=</span>
    </div>
  </div>
</div>

<div class="view-area" id="viewArea">
  <div class="empty-msg" id="emptyMsg">No doors added yet. Use the buttons above to add doors.</div>
</div>

<script>
let doors=[],nextId=1,dragSrc=null;
// Save lock: prevents duplicate saves per orderNum
// Uses both in-memory map (fast) + localStorage (survives refresh)
const _saveLock = {}; // in-memory: orderNum -> timestamp
function _canSave(orderNum){
  const now = Date.now();
  // Check in-memory first (catches rapid double-clicks)
  if(_saveLock[orderNum] && (now - _saveLock[orderNum]) < 50000) return false;
  // Check localStorage (catches post-refresh duplicates)
  try{
    const map = JSON.parse(localStorage.getItem('elc_save_times')||'{}');
    if(map[orderNum] && (now - map[orderNum]) < 50000) return false;
  }catch(e){}
  return true;
}
function _markSaved(orderNum){
  const now = Date.now();
  _saveLock[orderNum] = now;
  try{
    const map = JSON.parse(localStorage.getItem('elc_save_times')||'{}');
    map[orderNum] = now;
    const keys = Object.keys(map);
    if(keys.length > 100) keys.sort((a,b)=>map[a]-map[b]).slice(0,keys.length-100).forEach(k=>delete map[k]);
    localStorage.setItem('elc_save_times', JSON.stringify(map));
  }catch(e){}
}

function resetAll(){
  // Clear all customer fields
  ['custName','custWhatsapp','custAddress','orderNotes'].forEach(id=>{
    const el = document.getElementById(id);
    if(el){ el.value=''; }
  });
  const ps = document.getElementById('paymentStatus');
  if(ps) ps.value='Cash';

  // Set today's date
  const dateField = document.getElementById('orderDate');
  if(dateField) dateField.valueAsDate = new Date();

  // Auto-generate new Order ID
  const year = new Date().getFullYear();
  const stored = parseInt(localStorage.getItem('elc_order_seq')||'0') + 1;
  localStorage.setItem('elc_order_seq', stored);
  const ordEl = document.getElementById('orderNum');
  if(ordEl) ordEl.value = 'ELC-' + year + '-' + String(stored).padStart(4,'0') + '-IU';

  // Remove all doors
  doors = [];
  nextId = 1;
  document.getElementById('door-list').innerHTML = '';
  document.getElementById('emptyMsg').style.display = '';
  updateSummary();
}

function formatWA(el){
  let v = el.value.replace(/\D/g,'');
  if(v.startsWith('94')) v = v.slice(2);
  if(v.startsWith('0')) v = v.slice(1);
  if(v.length > 9) v = v.slice(0,9);
  el.value = '+94' + v;
}

function frac(v){
  const n=parseFloat(v);if(isNaN(n))return'0';
  const w=Math.floor(n),d=Math.round((n-w)*4);
  if(d===0)return''+w;if(d===1)return w+' 1/4';if(d===2)return w+' 1/2';if(d===3)return w+' 3/4';return''+n;
}

    if(v.startsWith('94')) v = v.slice(2);
    else if(v.startsWith('0')) v = v.slice(1);
    if(v.length < 9) return raw; // too short — return as-is
    v = v.slice(0,9);

    const pgClass = dhMm > 65 ? 'pg1-card' : 'pg2-card';

      // Keep SVG viewBox intact, just force 100% fill of container
      const svgFinal = svgHTML
        .replace(/(<svg\b[^>]*?)style="[^"]*"/,'$1')
        .replace(/(<svg\b[^>]*?)width="[^"]*"/,'$1')
        .replace(/(<svg\b[^>]*?)height="[^"]*"/,'$1')
        .replace(/(<svg\b)/,'$1 width="100%" height="100%" style="-webkit-print-color-adjust:exact;print-color-adjust:exact;"');

      const cardH = dhMm;

    if(dv.type==='wg') return !(dv.h===0 && dv.w===0);
    return !(dv.bh===0 && dv.eh===0 && dv.bw===0 && dv.ew===0);

    pages.push({list:rest.slice(i,i+P2), first:false});

      <div class="hdr-ord-row"><span class="hol">Date</span><span class="hov">${orderDate}</span></div>
      <div class="hdr-ord-row"><span class="hol">Total Doors</span><span class="hov">${totalDoors}</span></div>
    </div>
  </div>
  <div class="info-wrap">
    <div class="info-row">
      <div class="info-cell"><span class="il">Customer Name</span><span class="iv">${custName}</span></div>
      <div class="info-cell wide"><span class="il">Address</span><span class="iv">${custAddress}</span></div>
      <div class="info-cell"><span class="il">WhatsApp No</span><span class="iv">${custWhatsapp}</span></div>
    </div>
    <div class="info-row amounts-row">
      <!-- Door type sub-totals row -->
      ${d1Sum > 0 ? `<div class="amount-box" style="border-color:#1a1aff44;background:#f0f4ff;flex:1;min-width:0;padding:2mm 3mm;">
        <div class="amt-label" style="color:#1a1aff;font-size:9px;">D 01) Total</div>
        <div class="amt-value" style="color:#1a1aff;font-size:12px;white-space:nowrap;">${fmtAmt(d1Sum)}</div>
      </div>` : ''}
      ${d2Sum > 0 ? `<div class="amount-box" style="border-color:#cc000044;background:#fff5f5;flex:1;min-width:0;padding:2mm 3mm;">
        <div class="amt-label" style="color:#cc0000;font-size:9px;">D 02) Total</div>
        <div class="amt-value" style="color:#cc0000;font-size:12px;white-space:nowrap;">${fmtAmt(d2Sum)}</div>
      </div>` : ''}
      ${wgSum > 0 ? `<div class="amount-box" style="border-color:#c8a00044;background:#fffbf0;flex:1;min-width:0;padding:2mm 3mm;">
        <div class="amt-label" style="color:#c8a000;font-size:9px;">WG Total</div>
        <div class="amt-value" style="color:#c8a000;font-size:12px;white-space:nowrap;">${fmtAmt(wgSum)}</div>
      </div>` : ''}
      ${additionalAmt > 0 ? `<div class="amount-box" style="border-color:#7a3dcc;background:#f8f0ff;flex:1;min-width:0;padding:2mm 3mm;">
        <div class="amt-label" style="color:#7a3dcc;font-size:9px;">Additional</div>
        <div class="amt-value" style="color:#7a3dcc;font-size:12px;white-space:nowrap;">${fmtAmt(additionalAmt)}</div>
      </div>` : ''}
      <div class="amount-box" style="border-color:#1a2340;background:#1a2340;flex:1;min-width:0;">
        <div class="amt-label" style="color:#f5d800;letter-spacing:1px;">TOTAL AMOUNT</div>
        <div class="amt-value" style="color:#f5d800;font-size:20px;">${fmtAmt(grandTotal)}</div>
        ${advanceAmt > 0 ? `<div style="margin-top:3px;font-size:9px;color:#aab8cc;font-weight:600;letter-spacing:0.5px;">${payStatus}</div>` : ''}
      </div>
      ${advanceAmt > 0 ? `
      <div style="display:flex;flex-direction:column;gap:2mm;flex:0 0 auto;min-width:28mm;max-width:34mm;">
        <div style="border:2px solid #007a3d;background:linear-gradient(135deg,#f0faf5,#e0f5ea);border-radius:6px;padding:2mm 3mm;flex:1;display:flex;flex-direction:column;justify-content:center;">
          <div style="font-size:7px;font-weight:800;color:#007a3d;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:1mm;">✓ ADVANCE PAID</div>
          <div style="font-size:12px;font-weight:900;color:#007a3d;white-space:nowrap;">${fmtAmt(advanceAmt)}</div>
        </div>
        <div style="border:2px solid #cc0000;background:linear-gradient(135deg,#fff5f5,#ffe8e8);border-radius:6px;padding:2mm 3mm;flex:1;display:flex;flex-direction:column;justify-content:center;">
          <div style="font-size:7px;font-weight:800;color:#cc0000;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:1mm;">⚡ OUTSTANDING</div>
          <div style="font-size:12px;font-weight:900;color:#cc0000;white-space:nowrap;">${fmtAmt(Math.max(0, grandTotal - advanceAmt))}</div>
        </div>
      </div>` : ''}
    </div>
    ${orderNotes && orderNotes !== '-' ? `<div class="info-row"><div class="info-cell wide"><span class="il">Notes</span><span class="iv notes-val">${orderNotes}</span></div></div>` : ''}
  </div>
  <div class="divider"></div>
  `;

  /* ── assemble pages ── */
  let body='';
  pages.forEach((pg,pi)=>{
    let rows='', rowsWrapped='';

    if(pg.first){
      /* ── PAGE 1: 2 doors fill remaining height after header ── */
      const p1c = pg.list.map(dv=>card(dv, DH1_MM, dv.num));
      if(p1c.length === 1){
        // Same half-width column as the 2-door layout, so the SVG scale stays
        // identical whether Door 2 is added later or not.
        rows = `<div style="display:flex;flex:1;min-height:0;overflow:hidden;gap:2mm;">
          <div style="flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column;">${p1c[0]}</div>
          <div style="flex:1;min-width:0;overflow:hidden;"></div>
        </div>`;
      } else {
        rows = `<div style="display:flex;flex:1;min-height:0;overflow:hidden;gap:2mm;">
          <div style="flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column;">${p1c[0]}</div>
          <div style="flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column;">${p1c[1]}</div>
        </div>`;
      }
      rowsWrapped = rows;
    } else {
      /* ── PAGE 2+: dynamic layout 1–4 doors fill full page ── */
      const n = pg.list.length;
      const rh = pg2RowHeights(n);

      /* Always 2-col layout — only render rows that have content */
      const c0=card(pg.list[0],rh[0],pg.list[0].num);
      const c1=pg.list[1]?card(pg.list[1],rh[0],pg.list[1].num):'<div class="col"></div>';
      const c2=pg.list[2]?card(pg.list[2],rh[1],pg.list[2].num):'';
      const c3=pg.list[3]?card(pg.list[3],rh[1],pg.list[3].num):'';
      const row1 = `<div class="row" style="height:${rh[0]}mm${(c2||c3)?`;margin-bottom:${ROW_GAP}mm`:''}">
          <div class="col">${c0}</div><div class="col">${c1}</div>
        </div>`;
      const row2 = (c2||c3) ? `<div class="row" style="height:${rh[1]}mm">
          <div class="col">${c2}</div><div class="col">${c3}</div>
        </div>` : '';
      rows = row1 + row2;
      rowsWrapped = rows;
    }

    const pb = pi<pages.length-1 ? 'page-break-after:always;break-after:page;' : '';
    body+=`<div class="pg ${pg.first?'pg-first':''}" style="${pb}${pg.first?'height:252mm;':''}">${pg.first?custHTML:''}${rowsWrapped}</div>`;
  });

  // Single fixed footer — appears on every printed page automatically
  body += `
  <div class="footer-wrap">
    <div class="footer-line"></div>
    <div class="footer-inner">
      <div class="footer-left">
        <div class="footer-company">ELCARDO AUTOMATION</div>
        <div class="footer-tagline">Engineering Excellence Since 1978</div>
      </div>

      </div>
      <div class="footer-right">
        <div class="footer-page">Page <span class="pg-num"></span> of ${pages.length}</div>
        <div class="footer-generated">Generated: ${new Date().toLocaleDateString('en-GB')}</div>
      </div>
    </div>
  </div>`;

  /* page */
  .pg{width:200mm;min-height:10mm;display:flex;flex-direction:column;overflow:hidden;}
  .pg-first{width:200mm;overflow:hidden;display:flex;flex-direction:column;box-sizing:border-box;}
  /* footer-spacer pushes footer down; doors-center fills remaining height */
  .footer-spacer{flex:1;min-height:2mm}

  /* ── PROFESSIONAL HEADER ── */
  .hdr-wrap{
    display:flex;align-items:center;gap:5mm;
    background:linear-gradient(135deg,#1a2340 0%,#22304d 100%);
    border-radius:3px 3px 0 0;
    padding:5mm 7mm;width:200mm;box-sizing:border-box;
    margin-bottom:0;
  }
  .hdr-logo img{height:22mm;width:22mm;object-fit:contain;border-radius:50%;border:3px solid #c8a000;background:white;padding:1.5mm}
  .hdr-title{flex:1;text-align:center}
  .hdr-main{font-size:34px;font-weight:900;color:#f5d800;letter-spacing:4px;text-transform:uppercase}
  .hdr-sub{font-size:14px;font-weight:600;color:#aab8cc;letter-spacing:5px;margin-top:2mm}
  .hdr-order{display:flex;flex-direction:column;gap:2.5mm;min-width:52mm}
  .hdr-ord-row{display:flex;align-items:center;gap:2mm}
  .hol{font-size:13px;font-weight:700;color:#7a8fa8;min-width:30mm}
  .hov{font-size:14px;font-weight:700;color:#f0f4ff;background:rgba(255,255,255,0.08);padding:3px 8px;border-radius:2px;border:1px solid rgba(200,160,0,0.3)}

  .info-wrap{
    background:#f7f8fa;border-left:1px solid #dde;border-right:1px solid #dde;
    padding:3mm 5mm;width:200mm;box-sizing:border-box;overflow:visible;
  }
  .info-row{display:flex;gap:4mm}
  .info-cell{display:flex;flex-direction:column;gap:1mm;min-width:50mm}
  .info-cell.wide{flex:1}
  .il{font-size:15px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px}
  .iv{font-size:20px;font-weight:700;color:#222}
  .notes-val{font-size:17px;font-weight:400;color:#444;white-space:pre-wrap;min-height:10mm;line-height:1.6}

  /* amount boxes row */
  .amounts-row{display:flex;gap:3mm;margin-top:2mm;align-items:stretch;flex-wrap:wrap}
  .amount-box{
    flex:1;border:2px solid #1a2340;border-radius:6px;
    padding:3mm 4mm;display:flex;flex-direction:column;gap:1mm;
    background:#f8f9fc;
  }
  .amount-box.advance{border-color:#007a3d;background:#f0faf5}
  .amount-box.outstanding{border-color:#cc0000;background:#fff5f5}
  .amount-box.payment{border-color:#c8a000;background:#fffbf0;flex:0 0 auto;min-width:30mm}
  .amt-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.5px}
  .amt-value{font-size:18px;font-weight:900;color:#1a2340}
  .amount-box.advance .amt-value{color:#007a3d}
  .amount-box.outstanding .amt-value{color:#cc0000}
  .pstatus{font-size:16px;font-weight:900;color:#c8a000}

  .divider{
    height:4px;width:200mm;
    background:linear-gradient(90deg,#1a2340,#c8a000,#cc0000,#c8a000,#1a2340);
    margin-bottom:3mm;
    border-radius:0 0 2px 2px;
  }

  /* door row */
  .row{display:flex;flex-direction:row;gap:2mm;overflow:visible;align-items:flex-start;}
  .row-center{justify-content:center}
  /* Page1: vertical+horizontal center wrapper */
  .doors-center{
    display:block;
    overflow:hidden;
    flex:1;
    min-height:0;
  }

  /* ── col & card base ── */
  .col{flex:0 0 99mm;width:99mm;overflow:hidden;height:100%;display:flex!important;flex-direction:column!important}
  /* Short rows (1-2 doors): auto height, don't stretch to fill page */
  .pg2-short-row{display:flex!important;flex-direction:row!important;align-items:flex-start!important;}
  .pg2-short-col{flex:0 0 99mm!important;width:99mm!important;height:auto!important;overflow:hidden;}
  .pg2-short-col .card{height:auto!important;}
  .col-full{flex:0 0 200mm!important;width:200mm!important}
  .col .card{flex:1;min-height:0}
  /* Full-width single door on page2+ */
  .col[style*="200mm"]{flex:0 0 200mm!important;width:200mm!important}
  .col[style*="200mm"] .card{width:200mm!important}

  .card{
    width:99mm;height:100%;border:1.5px solid #ccd;border-radius:4px;
    padding:2mm 2.5mm;overflow:hidden;
    display:flex!important;flex-direction:column!important;
    box-sizing:border-box;background:white;
  }
  /* pg1 cards fill their container */
  .pg1-card{overflow:hidden!important;flex:1!important;min-height:0!important;}
  .card.twg{border-top:3px solid #c8a000}
  .card.t1{border-top:3px solid #1a1aff}
  .card.t2{border-top:3px solid #cc0000}

  /* badge */
  .dh{flex-shrink:0;margin-bottom:1.5mm}
  .badge{font-size:13px;font-weight:800;padding:4px 12px;border-radius:3px;color:white;letter-spacing:0.5px;text-transform:uppercase}
  .lblwg{background:#888}.lbl1{background:#1a1aff}.lbl2{background:#cc0000}

  /* ══════════════════════════════════════════
     PAGE 1 CARD  (dhMm=69 → pg1-card)
     Layout: details strip TOP, SVG fills REST
     Details row: inputs+totals side-by-side in one compact row
  ══════════════════════════════════════════ */
  /* PAGE1: details TOP — compact, SVG fills max space */
  .pg1-card{flex-direction:column!important;align-items:stretch;display:flex!important}

  .pg1-card .card-details{
    flex:0 0 auto;
    display:flex;flex-direction:column;
    gap:0;overflow:hidden;
    padding-bottom:1mm;border-bottom:2px solid #1a1aff;
    margin-bottom:1mm;
    border-right:none!important;padding-right:0!important;
  }

  /* 2×2 input grid */
  .pg1-card .ig{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:0;
    border:1.5px solid #ccc;
    border-radius:3px;
    overflow:hidden;
    margin-bottom:1px;
  }
  .pg1-card .ig .fi{
    display:flex;flex-direction:column;
    border-right:1px solid #ccc;
    border-bottom:1px solid #ccc;
    padding:1px 3px;
  }
  .pg1-card .ig .fi:nth-child(even){border-right:none}
  .pg1-card .ig .fi:nth-child(3),
  .pg1-card .ig .fi:nth-child(4){border-bottom:none}
  .pg1-card .ig .fi label{
    font-size:7px;font-weight:700;color:#555;
    text-transform:uppercase;
    line-height:1.3;background:#f5f5f5;
    margin:-1px -3px 1px -3px;padding:1px 3px;
    border-bottom:1px solid #ddd;
  }
  .pg1-card .ig .fi input{
    padding:0 2px;font-size:13px;font-weight:700;
    border:none;border-radius:0;
    width:100%;color:#222;background:white;
    outline:none;line-height:1.5;
  }

  /* totals compact */
  .pg1-card .tots{
    flex-shrink:0;padding:2px 3px;
    background:white;border-radius:3px;
    display:flex;flex-direction:column;gap:2px;
    border:1px solid #eee;
  }

  /* SVG container — never clip SVG */
  .pg1-card .card-svg{
    display:block;
    width:100%;
    overflow:visible;
    line-height:0;
    flex:1 1 auto;
  }
  .pg1-card .card-svg svg{
    display:block;
    width:100%;
    height:auto !important;
    overflow:visible;
  }

  /* ══════════════════════════════════════════
     PAGE 2+ CARD  (dhMm=63 → pg2-card)
     Layout: details compact strip TOP, SVG fills ALL remaining
     Details: inputs 2×2 + totals in ONE horizontal row
  ══════════════════════════════════════════ */
  .pg2-card .card-details{
    flex-shrink:0;
    display:flex;flex-direction:row;gap:2mm;align-items:center;
    padding-bottom:1mm;border-bottom:1px solid #e0e0e0;margin-bottom:1mm;
    flex-wrap:nowrap;overflow:hidden;
  }
  .pg2-card .ig{
    display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:2px;
    flex:1;min-width:0;
  }
  .pg2-card .tots{
    flex-shrink:0;padding:3px 4px;background:#f9f9f9;border-radius:3px;
    display:flex;flex-direction:column;gap:3px;
    border:1px solid #e0e0e0;
  }
  /* SVG fills ALL remaining space */
  .pg2-card .card-svg{
    flex:1;min-height:0;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    width:100%;
  }
  .pg2-card .card-svg svg{
    display:block;width:100%;height:100%;max-width:100%;max-height:100%;
  }

  /* ── shared input/label/total sizes ── */
  .fi{display:flex;flex-direction:column;gap:0}
  .pg1-card .fi label{font-size:8px;font-weight:700;color:#555;line-height:1.3;text-transform:uppercase}
  .pg1-card .fi input{padding:1px 2px;font-size:14px;font-weight:700;border:none;border-radius:0;width:100%;color:#222;background:white}
  .pg2-card .fi label{font-size:8px;font-weight:700;color:#555;line-height:1.2;text-transform:uppercase}
  .pg2-card .fi input{padding:1px 3px;font-size:10px;font-weight:700;border:1px solid #bbb;border-radius:2px;width:100%;color:#222;background:white}

  /* totals rows */
  .tr2{display:flex;align-items:center;gap:2px;flex-wrap:nowrap}
  .pg1-card .tl{font-size:11px;font-weight:900;min-width:50px;white-space:nowrap}
  .pg1-card .tv{padding:1px 4px;font-size:11px;font-weight:700;min-width:24px;text-align:center;background:white;border:1px solid #ddd;border-radius:2px}
  .pg1-card .tp,.pg1-card .te{font-size:10px;font-weight:700;color:#888}

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwu_gaRla6TkmdZ8xZ51YhXA6KxRIkp9qisCvAvK1l-CU4qvfhcEGHLU6w-w8K5dSHA/exec';

const _pendingSaves = new Set(); // prevent concurrent network requests for same order
function saveToSheet(custName, custWhatsapp, custAddress, orderNum, orderDate,
                     totalAmount, advanceAmt, outstanding, payStatus, allDoors) {
  if (!SCRIPT_URL || SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return;
  if (_pendingSaves.has(orderNum)) { console.log('Save in progress, skipping:', orderNum); return; }
  _pendingSaves.add(orderNum);

  const payload = {
    custName, custWhatsapp, custAddress,
    orderNum, orderDate,
    totalAmt: totalAmount, advanceAmt, outstandingAmt: outstanding,
    payStatus,
    savedAt: new Date().toISOString(),
    doors: allDoors.map((d, i) => {
      const base = { doorIndex: i + 1, type: d.type };
      if (d.type === 'wg') {
        const sqFt = d.h && d.w ? Math.round(d.h * d.w / 144 * 100) / 100 : '';
        return { ...base, label: 'Wicket Gate', totalH: d.h, totalW: d.w,
                 sqFt: sqFt, totalCost: d.totalCost || 0 };
      } else {
        const th = d.bh + d.eh, tw = d.bw + d.ew;
        const sqFt = th && tw ? Math.round(th * tw / 144 * 100) / 100 : '';
        return { ...base,
          label: d.type === 't1' ? 'D 01)' : 'D 02)',
          baseH: d.bh, extraH: d.eh, totalH: th,
          baseW: d.bw, extraW: d.ew, totalW: tw,
          sqFt: sqFt,
          motor: d.motor || '', motorType: d.motorType || '', motorPrice: d.motorPrice || 0,
          combo: d.combo || '', totalCost: d.totalCost || 0
        };
      }
    })
  };

  fetch(SCRIPT_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(() => { setTimeout(() => _pendingSaves.delete(orderNum), 5000); })
  .catch(err => { _pendingSaves.delete(orderNum); console.error('Sheet save failed:', err); });
}

function updateSummary(){
  document.getElementById('sum-total').textContent=doors.length;
  document.getElementById('sum-wg').textContent=doors.filter(d=>d.type==='wg').length;
  document.getElementById('sum-t1').textContent=doors.filter(d=>d.type==='t1').length;
  document.getElementById('sum-t2').textContent=doors.filter(d=>d.type==='t2').length;

  // Calculate total costs by type
  const d1Total = doors.filter(d=>d.type==='t1').reduce((s,d)=>s+(d.totalCost||0),0);
  const d2Total = doors.filter(d=>d.type==='t2').reduce((s,d)=>s+(d.totalCost||0),0);
  const wgTotal = doors.filter(d=>d.type==='wg').reduce((s,d)=>s+(d.totalCost||0),0);
  const addAmt  = parseFloat((document.getElementById('additionalAmount')||{}).value)||0;
  const grandTotal = d1Total + d2Total + wgTotal + addAmt;

  const fmt = v => 'Rs. ' + Math.round(v).toLocaleString() + '/=';
  document.getElementById('sum-d1cost').textContent  = fmt(d1Total);
  document.getElementById('sum-d2cost').textContent  = fmt(d2Total);
  document.getElementById('sum-wgcost').textContent  = fmt(wgTotal);
  document.getElementById('sum-addcost').textContent = fmt(addAmt);
  document.getElementById('sum-totalamt').textContent= fmt(grandTotal);
}

function addDoor(type){
  const id=nextId++;
  doors.push({id,type,motor:'Left',boxes:{LR:true,LY:true,RY:true,RR:true,LO:true,LB:true,RB:true,RO:true},red:true,blue:true});
  document.getElementById('emptyMsg').style.display='none';
  const va=document.getElementById('viewArea');
  const div=document.createElement('div');
  div.className='door-block '+(type==='wg'?'twg':type==='t1'?'t1':'t2');
  div.id='door-'+id;
  div.draggable=true;
  div.addEventListener('dragstart',e=>{dragSrc=div;div.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
  div.addEventListener('dragend',()=>{div.classList.remove('dragging');document.querySelectorAll('.door-block').forEach(b=>b.classList.remove('drag-over'));});
  div.addEventListener('dragover',e=>{e.preventDefault();if(div!==dragSrc)div.classList.add('drag-over');});
  div.addEventListener('dragleave',()=>div.classList.remove('drag-over'));
  div.addEventListener('drop',e=>{
    e.preventDefault();div.classList.remove('drag-over');
    if(dragSrc&&dragSrc!==div){
      const kids=[...va.children].filter(c=>c.id!=='emptyMsg');
      const si=kids.indexOf(dragSrc),di=kids.indexOf(div);
      if(si<di)va.insertBefore(dragSrc,div.nextSibling);else va.insertBefore(dragSrc,div);
      const sid=+dragSrc.id.split('-')[1],did2=+div.id.split('-')[1];
      const si2=doors.findIndex(d=>d.id===sid),di2=doors.findIndex(d=>d.id===did2);
      const [r]=doors.splice(si2,1);doors.splice(di2,0,r);
    }
  });
  if(type==='wg')div.innerHTML=wgHTML(id);
  else if(type==='t1')div.innerHTML=d1HTML(id);
  else div.innerHTML=d2HTML(id);
  va.appendChild(div);
  if(type==='wg')wgUpdate(id);else if(type==='t1')d1Update(id);else d2Update(id);
  updateSummary();
}

function deleteDoor(id){
  doors=doors.filter(d=>d.id!==id);
  const el=document.getElementById('door-'+id);if(el)el.remove();
  if(!doors.length)document.getElementById('emptyMsg').style.display='';
  updateSummary();
}

      <div class="total-row"><span class="tlabel blue">TOTAL W:</span><span class="tval" id="d1-dbw-${id}">39½</span><span class="tplus">+</span><span class="tval" id="d1-dew-${id}">8½</span><span class="teq">=</span><span class="tval" id="d1-dtw-${id}">48</span></div>

  <div class="svg-preview">${d1SVG(id)}</div>

}
function d1Motor(id,s){
  const d=doors.find(x=>x.id===id);d.motor=s;
  document.getElementById('d1-mL-'+id).classList.toggle('active',s==='Left');
  document.getElementById('d1-mR-'+id).classList.toggle('active',s==='Right');
  document.getElementById('d1cL-'+id).setAttribute('fill',s==='Left'?'#f5d800':'white');
  document.getElementById('d1cR-'+id).setAttribute('fill',s==='Right'?'#f5d800':'white');
}
function d1CalcCost(id){
  const d = doors.find(x=>x.id===id);
  const motorType  = document.getElementById('d1-motorType-'+id).value;
  const motorPrice = parseFloat(document.getElementById('d1-motorPrice-'+id).value)||0;
  const sqftPrice  = parseFloat(document.getElementById('d1-sqftPrice-'+id).value)||0;
  // Read directly from input fields (most up-to-date values)
  const bh = parseFloat(document.getElementById('d1-bh-'+id).value)||0;
  const eh = parseFloat(document.getElementById('d1-eh-'+id).value)||0;
  const bw = parseFloat(document.getElementById('d1-bw-'+id).value)||0;
  const ew = parseFloat(document.getElementById('d1-ew-'+id).value)||0;
  const th = bh + eh;
  const tw = bw + ew;
  const area = Math.round((th * tw) / 144 * 100) / 100;
  // Minimum 50 sq ft rule:
  // area < 50  → Total = Motor Price + (50 × Price per sq ft)
  // area >= 50 → Total = Motor Price + (area × Price per sq ft)
  const billableArea = area < 50 ? 50 : area;
  const total = motorPrice + (billableArea * sqftPrice);
  d.motorType  = motorType;
  d.motorPrice = motorPrice;
  d.sqftPrice  = sqftPrice;
  d.totalCost  = total;
  document.getElementById('d1-totalCost-'+id).textContent =
    'Rs. ' + Math.round(total).toLocaleString() + '/=';
  // Update header badge
  const hdrCost=document.getElementById('hdr-cost-'+id);
  if(hdrCost){hdrCost.textContent='Total Cost: Rs. '+Math.round(total).toLocaleString()+'/=';hdrCost.style.display=total>0?'':'none';}
  updateSummary();
}
function d1Box(id,key){
  const d=doors.find(x=>x.id===id);d.boxes[key]=!d.boxes[key];
  document.getElementById('d1-b'+key+'-'+id).classList.toggle('active',d.boxes[key]);
  const activeColors={LR:'#dd1111',LY:'#f5d800',RY:'#f5d800',RR:'#dd1111'};
  const el=document.getElementById('d1'+key+'-'+id);
  el.setAttribute('fill',d.boxes[key]?activeColors[key]:'white');
  el.setAttribute('fill-opacity','1');
  el.style.fill=d.boxes[key]?activeColors[key]:'white';
}
function d1Update(id){
  const bhEl=document.getElementById('d1-bh-'+id);
  const ehEl=document.getElementById('d1-eh-'+id);
  const bwEl=document.getElementById('d1-bw-'+id);
  const ewEl=document.getElementById('d1-ew-'+id);

  const bh=parseFloat(bhEl.value)||0;
  const bw=parseFloat(bwEl.value)||0;
  const eh=parseFloat(ehEl.value)||0;
  const ew=parseFloat(ewEl.value)||0;
  const th=bh+eh,tw=bw+ew;
  document.getElementById('d1-dbh-'+id).textContent=frac(bh);
  document.getElementById('d1-deh-'+id).textContent=frac(eh);
  document.getElementById('d1-dth-'+id).textContent=frac(th);
  document.getElementById('d1-dbw-'+id).textContent=frac(bw);
  document.getElementById('d1-dew-'+id).textContent=frac(ew);
  document.getElementById('d1-dtw-'+id).textContent=frac(tw);
  document.getElementById('d1svgBH-'+id).textContent='Base Height: '+frac(bh);
  document.getElementById('d1svgTH-'+id).textContent='Total H: '+frac(th);
  document.getElementById('d1svgBW-'+id).textContent='Base Width: '+frac(bw);
  document.getElementById('d1svgTW-'+id).textContent='Total W: '+frac(tw);
  document.getElementById('d1svgArea-'+id).textContent=(th*tw/144).toFixed(2)+' sq ft';
  d1CalcCost(id);
}

function d2Combo(id,btn,l,r){

  document.getElementById('d2LL-'+id).textContent=l;
  document.getElementById('d2RL-'+id).textContent=r;
}
function d2Box(id,key){
  const d=doors.find(x=>x.id===id);d.boxes[key]=!d.boxes[key];
  document.getElementById('d2-b'+key+'-'+id).classList.toggle('active',d.boxes[key]);
  const activeColors2={LO:'#ff8c00',LB:'#00bfff',RB:'#00bfff',RO:'#ff8c00'};
  const el2=document.getElementById('d2'+key+'-'+id);
  el2.setAttribute('fill',d.boxes[key]?activeColors2[key]:'white');
  el2.setAttribute('fill-opacity','1');
  el2.style.fill=d.boxes[key]?activeColors2[key]:'white';
}
function d2Update(id){
  const bhEl2=document.getElementById('d2-bh-'+id);
  const ehEl2=document.getElementById('d2-eh-'+id);
  const bwEl2=document.getElementById('d2-bw-'+id);
  const ewEl2=document.getElementById('d2-ew-'+id);

  const bh=parseFloat(bhEl2.value)||0;
  const bw=parseFloat(bwEl2.value)||0;
  const eh=parseFloat(ehEl2.value)||0;
  const ew=parseFloat(ewEl2.value)||0;
  const th=bh+eh,tw=bw+ew;
  document.getElementById('d2-dbh-'+id).textContent=frac(bh);
  document.getElementById('d2-deh-'+id).textContent=frac(eh);
  document.getElementById('d2-dth-'+id).textContent=frac(th);
  document.getElementById('d2-dbw-'+id).textContent=frac(bw);
  document.getElementById('d2-dew-'+id).textContent=frac(ew);
  document.getElementById('d2-dtw-'+id).textContent=frac(tw);
  document.getElementById('d2svgBH-'+id).textContent='BASE HEIGHT: '+frac(bh);
  document.getElementById('d2svgTH-'+id).textContent='Total H: '+frac(th);
  document.getElementById('d2svgBW-'+id).textContent='BASE WIDTH: '+frac(bw);
  document.getElementById('d2svgTW-'+id).textContent='Total W: '+frac(tw);
  if(document.getElementById('d2svgArea-'+id)) document.getElementById('d2svgArea-'+id).textContent=(th*tw/144).toFixed(2)+' sq ft';

  // Covering Cost = Price per running ft × Total Width (in ft)
  const priceEl   = document.getElementById('d2-price-'+id);
  const tcostEl   = document.getElementById('d2-tcost-'+id);
  const sqftPriceEl = document.getElementById('d2-sqftPrice-'+id);
  const totalCostEl = document.getElementById('d2-totalCostDisplay-'+id);

  if(priceEl && tcostEl){
    const price = parseFloat(priceEl.value)||0;
    const coveringCost = price * (tw / 12);
    tcostEl.textContent = 'Rs. ' + Math.round(coveringCost).toLocaleString() + '/=';

    // Total Cost = Covering Cost + (area × sqft price) with min 50 sq ft rule
    if(sqftPriceEl && totalCostEl){
      const sqftPrice = parseFloat(sqftPriceEl.value)||0;
      const area = Math.round((th * tw) / 144 * 100) / 100;
      const billableArea = area < 50 ? 50 : area;
      const totalCost = coveringCost + (billableArea * sqftPrice);
      totalCostEl.textContent = 'Rs. ' + Math.round(totalCost).toLocaleString() + '/=';
      // Save to door object
      const d = doors.find(x=>x.id===id);
      if(d){
        d.coveringCost = coveringCost;
        d.sqftPrice2   = sqftPrice;
        d.totalCost    = totalCost;
        // Update header badge
        const hdrCost=document.getElementById('hdr-cost-'+id);
        if(hdrCost){hdrCost.textContent='Total Cost: Rs. '+Math.round(totalCost).toLocaleString()+'/=';hdrCost.style.display=totalCost>0?'':'none';}
        updateSummary();
      }
    }
  }

  // Update SVG combo labels based on selected type
  const comboSel = document.getElementById('d2-combo-'+id);
  const combo = comboSel ? comboSel.value : 'L/C';
  const parts = combo.split('/');
  const leftLbl  = parts[0] || 'L';
  const rightLbl = parts[1] || 'C';

  // Color mapping
  const colorMap = {'L':'#1a1aff','U':'#1a1aff','F':'#cc0000','B':'#cc0000','C':'#cc0000'};
  const lColor = colorMap[leftLbl] || '#1a1aff';
  const rColor = colorMap[rightLbl] || '#cc0000';

  const llEl = document.getElementById('d2LL-'+id);
  const rlEl = document.getElementById('d2RL-'+id);
  if(llEl){ llEl.textContent = leftLbl;  llEl.setAttribute('fill', lColor); }
  if(rlEl){ rlEl.textContent = rightLbl; rlEl.setAttribute('fill', rColor); }

  // F/F: hide divider line; others: show
  const divider = document.getElementById('d2div-'+id);
  if(divider){ divider.style.display = combo==='F/F' ? 'none' : ''; }
}
